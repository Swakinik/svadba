<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Спасибо за ответ</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }
    video {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      display: block;
      background: #000;
    }
    .back {
      position: fixed;
      left: 16px;
      top: 16px;
      z-index: 10;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(0,0,0,.38);
      color: white;
      text-decoration: none;
      font-family: Arial, sans-serif;
      font-size: 14px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,.15);
    }
  </style>
</head>
<body>
  <a class="back" href="index.html">← Назад</a>
  <video id="video" autoplay loop playsinline preload="auto">
    <source src="media/rickroll.mp4" type="video/mp4" />
  </video>
  <script>
    const video = document.getElementById('video');

    async function forcePlay() {
      try {
        video.muted = false;
        video.volume = 1;
        await video.play();
      } catch (e) {
        console.log('Autoplay blocked by browser:', e);
      }
    }

    forcePlay();
    window.addEventListener('load', forcePlay);
    window.addEventListener('pageshow', forcePlay);
    document.addEventListener('DOMContentLoaded', forcePlay);
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) forcePlay();
    });
    setTimeout(forcePlay, 200);
    setTimeout(forcePlay, 1000);
    setTimeout(forcePlay, 2500);
  </script>
</body>
</html>
